name: Run FNO Alerts   # Ye naam Actions tab me dikhai dega

on:
  schedule:
    - cron: '0 4 * * *'   # Roz subah 9:30 IST (4:00 UTC)
  workflow_dispatch:      # Manual run option bhi rahega

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run script
        run: python Fno_alerts.py
